<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Workflow Assignment</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#4cd7f6",
                    "on-surface": "#dae2fd",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed": "#001f26",
                    "surface-variant": "#2d3449",
                    "on-tertiary-container": "#7d0023",
                    "primary": "#4cd7f6",
                    "on-secondary": "#3c0091",
                    "secondary-fixed-dim": "#d0bcff",
                    "tertiary": "#ffb2b7",
                    "inverse-on-surface": "#283044",
                    "surface-container": "#171f33",
                    "on-secondary-fixed": "#23005c",
                    "error-container": "#93000a",
                    "inverse-primary": "#00687a",
                    "tertiary-container": "#ff7f8b",
                    "primary-container": "#06b6d4",
                    "tertiary-fixed": "#ffdadb",
                    "outline-variant": "#3d494c",
                    "secondary": "#d0bcff",
                    "on-secondary-container": "#c4abff",
                    "inverse-surface": "#dae2fd",
                    "surface": "#0b1326",
                    "primary-fixed": "#acedff",
                    "on-tertiary-fixed": "#40000d",
                    "surface-bright": "#31394d",
                    "outline": "#869397",
                    "on-tertiary": "#67001b",
                    "secondary-fixed": "#e9ddff",
                    "on-primary": "#003640",
                    "on-error": "#690005",
                    "on-primary-container": "#00424f",
                    "surface-container-lowest": "#060e20",
                    "on-tertiary-fixed-variant": "#92002a",
                    "error": "#ffb4ab",
                    "on-surface-variant": "#bcc9cd",
                    "on-background": "#dae2fd",
                    "secondary-container": "#571bc1",
                    "primary-fixed-dim": "#4cd7f6",
                    "on-secondary-fixed-variant": "#5516be",
                    "background": "#0b1326",
                    "surface-container-highest": "#2d3449",
                    "surface-container-low": "#131b2e",
                    "surface-dim": "#0b1326",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "surface-container-high": "#222a3d",
                    "on-primary-fixed-variant": "#004e5c"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "lg": "24px",
                    "xl": "48px",
                    "xs": "4px",
                    "unit": "4px",
                    "side-margin": "32px",
                    "md": "16px",
                    "sm": "8px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "data-mono": ["JetBrains Mono"],
                    "body-sm": ["Inter"],
                    "headline-xl": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-caps": ["JetBrains Mono"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.08em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .neon-glow {
            box-shadow: 0 0 12px rgba(76, 215, 246, 0.3);
        }
        .neon-glow:hover {
            box-shadow: 0 0 20px rgba(76, 215, 246, 0.6);
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3449;
            border-radius: 2px;
        }
        .pulse-active {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 215, 246, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(76, 215, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 215, 246, 0); }
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
